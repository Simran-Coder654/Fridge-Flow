<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FridgeFlow</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-dark: #0a1a24;
            --primary-medium: #1b3b4f;
            --accent-gold: #ffe9a7;
            --accent-gold-dark: #f7d970;
            --text-light: #f0f9ff;
            --success-green: #4ecdc4;
            --level-blue: #5aa9e6;
            --coin-gold: #ffd966;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: radial-gradient(circle at 10% 30%, var(--primary-medium), var(--primary-dark));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 0.5rem;
            width: 100%;
            max-width: 100vw;
        }

        .page {
            max-width: 650px;
            width: 100%;
            background: rgba(10, 30, 40, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 20px 30px -10px black;
            max-height: 98vh;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .hidden { display: none !important; }

        .btn {
            background: linear-gradient(145deg, var(--accent-gold-dark), #e5c55c);
            border: none;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 1rem 3rem;
            border-radius: 60px;
            color: var(--primary-dark);
            cursor: pointer;
            border-bottom: 5px solid #9e7f3e;
            box-shadow: 0 6px 0 #7a5f2e;
            min-width: 240px;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #7a5f2e;
        }
        
        .btn-small {
            background: #263f4b;
            border: 1px solid #aacad4;
            color: white;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            border-bottom: 3px solid #0d262f;
            white-space: nowrap;
        }

        .welcome-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        
        .welcome-header h1 {
            font-size: clamp(2.5rem, 10vw, 3.5rem);
            color: var(--accent-gold);
            text-shadow: 0 4px 0 #1a4a5f;
            text-align: center;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 1;
            min-height: 200px;
        }

        .stats-row {
            display: flex;
            justify-content: space-around;
            background: #1d3e4f;
            border-radius: 40px;
            padding: 0.5rem;
            margin: 1rem 0;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .stat-card {
            background: #0d2c38;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .coin-display {
            background: linear-gradient(145deg, #f5cb5c, #e6b422);
            color: #2d2d2d;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 2px solid #ffecaa;
            box-shadow: 0 4px 0 #9e7419;
            margin-bottom: 1rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1rem 0;
        }
        
        .cat-btn {
            background: linear-gradient(145deg, #2b505f, #15343e);
            border: 2px solid #88b6c5;
            border-radius: 60px;
            padding: 0.8rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 1.6rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #0b1f27;
        }
        
        .win-loss {
            margin-left: auto;
            background: #1f404f;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 1rem;
        }
        
        .level-progress {
            font-size: 0.9rem;
            background: #0d2c38;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .level-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        
        .level-header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .category-badge {
            background: linear-gradient(135deg, #3a6b7a, #1d3e4f);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #5d8b9c;
        }
        
        .level-stats {
            display: flex;
            gap: 1rem;
            background: #1d3e4f;
            padding: 0.5rem 1rem;
            border-radius: 40px;
        }
        
        .level-stats span {
            font-weight: bold;
            color: var(--accent-gold);
        }
        
        .level-grid-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 1rem;
            margin: 1rem 0;
        }
        
        .level-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 0.6rem;
            max-height: 55vh;
            overflow-y: auto;
            padding: 0.3rem;
        }
        
        .level-card {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #2a4a5a, #1a3a4a);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid #4a6a7a;
            position: relative;
        }
        
        .level-card:hover {
            transform: translateY(-2px);
            border-color: var(--accent-gold);
        }
        
        .level-card:active {
            transform: translateY(2px);
        }
        
        .level-card.completed {
            background: linear-gradient(145deg, #2a7a5a, #1a5a3a);
            border-color: var(--success-green);
        }
        
        .level-card.active {
            background: linear-gradient(145deg, var(--level-blue), #3a7aaa);
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(90, 169, 230, 0.5);
        }
        
        .level-card.locked {
            background: linear-gradient(145deg, #2a3a42, #1a2a32);
            border-color: #4a5a62;
            opacity: 0.7;
        }
        
        .level-number {
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
        }
        
        .level-status {
            font-size: 0.7rem;
            margin-top: 4px;
        }
        
        .level-coins-badge {
            position: absolute;
            bottom: 4px;
            right: 6px;
            font-size: 0.6rem;
            background: rgba(0,0,0,0.5);
            padding: 0.1rem 0.3rem;
            border-radius: 12px;
            color: var(--coin-gold);
        }
        
        .unlock-button {
            position: absolute;
            bottom: 2px;
            left: 2px;
            right: 2px;
            background: #8e44ad;
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 0.55rem;
            padding: 0.2rem 0;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }
        
        @media (max-width: 650px) {
            .level-grid { grid-template-columns: repeat(8, 1fr); gap: 0.5rem; }
        }
        @media (max-width: 550px) {
            .level-grid { grid-template-columns: repeat(6, 1fr); }
            .level-number { font-size: 0.9rem; }
        }
        @media (max-width: 400px) {
            .level-grid { grid-template-columns: repeat(5, 1fr); }
        }
        
        .game-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1d3e4f;
            border-radius: 40px;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        .game-stats {
            display: flex;
            gap: 0.8rem;
        }
        
        .game-stats .stat {
            background: #0d2c38;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .level-badge {
            background: #2a5064;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 0.5rem;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #0d2c38;
            border-radius: 3px;
            margin: 0.5rem 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success-green), #ffe66d);
            width: 0%;
        }
        
        .item-belt {
            background: #1b3d48c9;
            border-radius: 40px;
            padding: 0.6rem;
            margin: 0.3rem 0;
            border: 2px dashed #9dcbd9;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.5rem;
            min-height: 4rem;
        }
        
        .item {
            font-size: 1.6rem;
            width: 2.4rem;
            height: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, #fafff0, #7799a8);
            border-radius: 30% 70% 50% 50%;
            box-shadow: 0 3px 0 #0c262f;
            cursor: grab;
            touch-action: none;
        }
        
        .drag-ghost {
            position: fixed;
            font-size: 2rem;
            width: 2.6rem;
            height: 2.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, #fafff0, #7799a8);
            border-radius: 30% 70% 50% 50%;
            box-shadow: 0 8px 15px black;
            border: 3px solid var(--success-green);
            z-index: 1000;
            pointer-events: none;
            opacity: 0.9;
            transform: translate(-50%, -50%);
        }
        
        .shelf.highlight {
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--success-green);
            border-color: var(--success-green);
        }
        
        .fridge {
            width: 260px;
            height: 340px;
            position: relative;
            perspective: 2000px;
            margin: 0 auto;
        }
        
        .fridge-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #d0dce0, #b1c2c9);
            border-radius: 20px;
            box-shadow: 0 12px 15px -6px black;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            overflow-y: auto;
        }
        
        .shelf-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            height: 65px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        
        .shelf {
            width: 48%;
            height: 100%;
            background: linear-gradient(165deg, #e0ecf5, #b8d0db);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 2px 3px rgba(255,255,255,0.9), 0 4px 5px -3px #061016;
            border-bottom: 3px solid #7fa0b0;
            transition: all 0.2s;
        }
        
        .tray-compartment {
            display: flex;
            gap: 5px;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.5);
            padding: 3px 5px;
            border-radius: 15px;
            width: 92%;
            height: 42px;
        }
        
        .tray-cell {
            width: 1.8rem;
            height: 1.8rem;
            background: #d4ecfc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        
        .tray-badge {
            background: #0e2a33;
            color: #ffecaa;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 0.2rem 0.3rem;
            border-radius: 15px;
            min-width: 2.4rem;
            text-align: center;
        }
        
        .fridge-door {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(130deg, #f0faff, #d0e2ec);
            border-radius: 20px;
            transform-origin: right center;
            transition: transform 0.5s;
            box-shadow: -5px 5px 12px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            top: 0;
            left: 0;
        }
        
        .fridge-door.open { transform: rotateY(140deg); }
        
        .handle {
            position: absolute;
            left: 6px;
            top: 40%;
            width: 6px;
            height: 50px;
            background: radial-gradient(circle, #ccc, #3a4850);
            border-radius: 8px;
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(3, 15, 22, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }
        
        .modal-overlay.show { visibility: visible; opacity: 1; }
        
        .modal-card {
            background: #1f404f;
            padding: 1.5rem;
            border-radius: 45px;
            border: 3px solid #f5cf7b;
            text-align: center;
            max-width: 90%;
        }
        
        .continue-options {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        
        .victory-effect {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(78,205,196,0.3), transparent 70%);
            animation: victoryPulse 1s ease-out;
            z-index: 999;
        }
        
        @keyframes victoryPulse {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.5); }
        }
        
        .category-back {
            background: #263f4b;
            border: 1px solid #aacad4;
            color: white;
            font-size: 0.9rem;
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
        }
        
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track { background: #0d2c38; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #5aa9e6; border-radius: 10px; }
        
        .sound-toggle {
            background: #1d3e4f;
            border: 1px solid #5d8b9c;
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
    </style>
</head>
<body>
    <div id="welcomePage" class="page">
        <div class="welcome-header"><h1>FRIDGE FLOW - For FUN</h1></div>
        <div class="button-container"><button class="btn" id="startBtn">START GAME</button></div>
    </div>
    
    <div id="categoryPage" class="page hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <h2 style="text-align:center; flex:1;">CHOOSE CATEGORY</h2>
            <button class="sound-toggle" id="soundToggle">🔊 SOUND ON</button>
        </div>
        <div class="coin-display">🪙 COINS: <span id="totalCoins">50</span></div>
        <div class="stats-row">
            <div class="stat-card">🏆 <span id="winTotal">0</span></div>
            <div class="stat-card">💔 <span id="lossTotal">0</span></div>
        </div>
        <div class="category-grid">
            <div class="cat-btn" id="selectFruit"><span>🍎🍌🍓</span><span>FRUITS</span><span class="level-progress" id="fruitLevel">Lvl 1/60</span><span class="win-loss" id="fruitWL">0/0</span></div>
            <div class="cat-btn" id="selectVeg"><span>🥕🥦🌽</span><span>VEGETABLES</span><span class="level-progress" id="vegLevel">Lvl 1/60</span><span class="win-loss" id="vegWL">0/0</span></div>
            <div class="cat-btn" id="selectDrink"><span>🥤🧃🍹</span><span>DRINKS</span><span class="level-progress" id="drinkLevel">Lvl 1/60</span><span class="win-loss" id="drinkWL">0/0</span></div>
        </div>
        <button class="btn-small" id="backFromCat">← BACK</button>
    </div>
    
    <div id="levelPage" class="page hidden">
        <div class="level-header">
            <div class="level-header-left">
                <button class="category-back" id="backToCategory">← BACK</button>
                <div class="category-badge" id="selectedCategoryTitle">🍎 FRUITS</div>
            </div>
            <div class="level-stats">
                <div>🔓 <span id="unlockedCount">1</span>/60</div>
                <div>✅ <span id="completedCount">0</span>/60</div>
                <div>🪙 <span id="levelPageCoins">50</span></div>
            </div>
        </div>
        
        <div class="level-grid-container">
            <div class="level-grid" id="levelGrid"></div>
        </div>
    </div>
    
    <div id="gamePage" class="page hidden">
        <div class="game-header">
            <button class="btn-small" id="backToLevels">← LEVELS</button>
            <div class="game-stats">
                <div class="stat">⭐<span id="gameScore">0</span></div>
                <div class="stat">⏳<span id="gameTime">120</span>s</div>
            </div>
        </div>
        <div class="level-badge">🎯 LEVEL <span id="currentLevel">1</span>/60 · 🪙 <span id="levelCoins">10</span> COINS</div>
        <div class="progress-bar"><div class="progress-fill" id="gameProgress"></div></div>
        <div class="item-belt" id="gameItems"></div>
        <div class="fridge-container">
            <div class="fridge" id="fridgeContainer">
                <div class="fridge-body" id="fridgeBody"></div>
                <div class="fridge-door" id="door">
                    <div class="handle"></div>
                    <span style="background:#1f4350;padding:0.3rem 0.8rem;border-radius:25px;">OPEN</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="resultModal">
        <div class="modal-card">
            <h1 id="resultTitle">🏆</h1>
            <div id="resultMessage"></div>
            <div class="stats-row">
                <div class="stat-card">⭐ <span id="finalScore">0</span></div>
                <div class="stat-card">⏱️ <span id="timeBonus">0</span></div>
                <div class="stat-card">🪙 <span id="coinsEarned">0</span></div>
            </div>
            <div class="continue-options" id="victoryButtons"></div>
        </div>
    </div>

    <script>
        (function(){
            let audioContext = null;
            let soundEnabled = true;
            
            function initAudio() {
                if (audioContext) return;
                try {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                } catch(e) {
                    console.log("Web Audio API not supported");
                    soundEnabled = false;
                }
            }
            
            function playBeep(frequency, duration, volume = 0.3) {
                if (!soundEnabled || !audioContext) return;
                try {
                    const now = audioContext.currentTime;
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    
                    oscillator.frequency.value = frequency;
                    gainNode.gain.setValueAtTime(volume, now);
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, now + duration);
                    
                    oscillator.start(now);
                    oscillator.stop(now + duration);
                } catch(e) { console.log("Audio error"); }
            }
            
            function playCorrectSound() {
                playBeep(523.25, 0.1, 0.2);  
                setTimeout(() => playBeep(659.25, 0.15, 0.2), 100);  
                setTimeout(() => playBeep(783.99, 0.2, 0.25), 200);  
            }
            
            function playWrongSound() {
                playBeep(440, 0.15, 0.25);   
                setTimeout(() => playBeep(349.23, 0.2, 0.25), 120);  
                setTimeout(() => playBeep(293.66, 0.25, 0.2), 250);  
            }
            
            function playVictorySound() {
                playBeep(523.25, 0.12, 0.25);
                setTimeout(() => playBeep(659.25, 0.12, 0.25), 120);
                setTimeout(() => playBeep(783.99, 0.15, 0.3), 240);
                setTimeout(() => playBeep(1046.5, 0.3, 0.35), 400);
                setTimeout(() => {
                    playBeep(783.99, 0.2, 0.25);
                    setTimeout(() => playBeep(880, 0.25, 0.3), 180);
                }, 550);
            }
            
            function playClickSound() {
                playBeep(880, 0.05, 0.1);
            }
            
            const CONFIG = { TRAY_MAX: 10, INITIAL_TIME: 120, POINTS_PER_ITEM: 10, PENALTY_PER_MISTAKE: 5, MAX_LEVEL: 60, BASE_COINS: 2 };
            const CATEGORIES = {
                fruit: { items: ['🍎','🍌','🍓','🍊','🍇','🍉','🍒','🍑','🍍','🥝','🍅','🍐','🍋','🥭','🍈','🍊','🍎','🍌'], name: 'Fruits', emoji: '🍎' },
                veg: { items: ['🥕','🥦','🌽','🥬','🫑','🍆','🥔','🧅','🥒','🌶️','🥗','🧄','🥑','🍠','🥕','🌽','🥦','🥬'], name: 'Vegetables', emoji: '🥕' },
                drink: { items: ['🥤','🧃','🍹','🧋','☕','🍵','🧉','🍺','🥛','🍷','🥂','🍸','🧊','🍾','🥤','🧃','🍹','🧋'], name: 'Drinks', emoji: '🥤' }
            };
            
            let state = {
                wins: { fruit: 0, veg: 0, drink: 0 },
                losses: { fruit: 0, veg: 0, drink: 0 },
                levels: { fruit: 1, veg: 1, drink: 1 },
                completedLevels: { fruit: [], veg: [], drink: [] },
                totalCoins: 50,
                currentCategory: 'fruit',
                currentLevel: 1,
                currentScore: 0,
                timeLeft: CONFIG.INITIAL_TIME,
                gameActive: false,
                trays: [],
                itemQueue: [],
                timerInterval: null,
                gameWon: false
            };
            
            let drag = { active: false, item: null, emoji: null, ghost: null };
            
            function calculateCoinsEarned(level) { 
                return Math.floor(CONFIG.BASE_COINS * (0.8 + level * 0.035) * 2.5); 
            }
            
            function updateStatsUI(){
                let totalWins = state.wins.fruit + state.wins.veg + state.wins.drink;
                let totalLosses = state.losses.fruit + state.losses.veg + state.losses.drink;
                document.getElementById('winTotal').textContent = totalWins;
                document.getElementById('lossTotal').textContent = totalLosses;
                document.getElementById('fruitWL').textContent = `${state.wins.fruit}/${state.losses.fruit}`;
                document.getElementById('vegWL').textContent = `${state.wins.veg}/${state.losses.veg}`;
                document.getElementById('drinkWL').textContent = `${state.wins.drink}/${state.losses.drink}`;
                document.getElementById('fruitLevel').textContent = `Lvl ${state.levels.fruit}/60`;
                document.getElementById('vegLevel').textContent = `Lvl ${state.levels.veg}/60`;
                document.getElementById('drinkLevel').textContent = `Lvl ${state.levels.drink}/60`;
                document.getElementById('totalCoins').textContent = state.totalCoins;
                document.getElementById('levelPageCoins').textContent = state.totalCoins;
            }
            
            function unlockLevelWithCoins(category, levelNum) {
                if(state.completedLevels[category].includes(levelNum)) {
                    alert("Level already completed!");
                    return false;
                }
                if(state.levels[category] > levelNum) {
                    alert("This level is already unlocked!");
                    return false;
                }
                if(levelNum === state.levels[category]) {
                    alert("This is your current level. Complete it to progress!");
                    return false;
                }
                if(levelNum > state.levels[category] && levelNum <= CONFIG.MAX_LEVEL){
                    let cost = 70;
                    if(state.totalCoins >= cost){
                        state.totalCoins -= cost;
                        state.levels[category] = levelNum + 1;
                        for(let i = state.levels[category]; i <= levelNum; i++){ 
                            if(!state.completedLevels[category].includes(i)) 
                                state.completedLevels[category].push(i); 
                        }
                        state.completedLevels[category] = [...new Set(state.completedLevels[category])];
                        updateStatsUI();
                        renderLevelGrid(category);
                        playClickSound();
                        alert(`Successfully unlocked level ${levelNum}! You can now play it.`);
                        return true;
                    } else { 
                        alert(`Not enough coins! Need ${cost} coins. You have ${state.totalCoins} coins.`);
                        return false; 
                    }
                }
                return false;
            }
            
            function renderLevelGrid(category){
                const grid = document.getElementById('levelGrid');
                if(!grid) return;
                grid.innerHTML = '';
                let currentUnlocked = state.levels[category];
                let completed = state.completedLevels[category] || [];
                
                for(let i=1; i<=CONFIG.MAX_LEVEL; i++){
                    const card = document.createElement('div');
                    card.className = 'level-card';
                    
                    if(completed.includes(i)) {
                        card.classList.add('completed');
                    } else if(i === currentUnlocked) {
                        card.classList.add('active');
                    } else if(i > currentUnlocked) {
                        card.classList.add('locked');
                    }
                    
                    card.innerHTML = `
                        <div class="level-number">${i}</div>
                        <div class="level-status">${completed.includes(i) ? '✓' : (i === currentUnlocked ? '🔓' : '🔒')}</div>
                        <div class="level-coins-badge">🪙${calculateCoinsEarned(i)}</div>
                    `;
                    
                    if(i > currentUnlocked && !completed.includes(i)){
                        let unlockBtn = document.createElement('div');
                        unlockBtn.className = 'unlock-button';
                        unlockBtn.textContent = `UNLOCK (70)`;
                        unlockBtn.onclick = (e) => { 
                            e.stopPropagation(); 
                            unlockLevelWithCoins(category, i); 
                        };
                        card.appendChild(unlockBtn);
                    }
                    
                    card.addEventListener('click', (e) => { 
                        if(i <= currentUnlocked || completed.includes(i)) {
                            playClickSound();
                            startGameWithLevel(category, i);
                        }
                    });
                    grid.appendChild(card);
                }
                
                document.getElementById('unlockedCount').textContent = currentUnlocked;
                document.getElementById('completedCount').textContent = completed.length;
            }
            
            function startGameWithLevel(category, level){
                initAudio();
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                state.currentCategory = category;
                state.currentLevel = level;
                state.currentScore = 0;
                state.timeLeft = CONFIG.INITIAL_TIME;
                state.gameActive = true;
                state.gameWon = false;
                state.trays = [];
                state.itemQueue = [];
                if(state.timerInterval) clearInterval(state.timerInterval);
                
                document.getElementById('gameScore').textContent = '0';
                document.getElementById('gameTime').textContent = CONFIG.INITIAL_TIME;
                document.getElementById('gameTime').style.color = '';
                document.getElementById('gameProgress').style.width = '0%';
                document.getElementById('currentLevel').textContent = level;
                document.getElementById('levelCoins').textContent = calculateCoinsEarned(level);
                
                buildFridge(category, level);
                fillItemQueue();
                updateItemBelt();
                
                const door = document.getElementById('door');
                door.classList.remove('open');
                door.onclick = () => door.classList.toggle('open');
                
                startTimer();
                showPage('gamePage');
            }
            
            function buildFridge(category, level){
                let items = CATEGORIES[category].items;
                const fridgeBody = document.getElementById('fridgeBody');
                fridgeBody.innerHTML = '<div style="position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,#fffde7,transparent 80%);opacity:0.15;pointer-events:none;"></div>';
                state.trays = [];
                let numTrays = Math.min(10 + Math.floor(level / 8), 16);
                numTrays = Math.min(numTrays, items.length);
                
                for(let row=0; row<8; row++){
                    let rowDiv = document.createElement('div'); 
                    rowDiv.className = 'shelf-row';
                    let leftIdx = row*2, rightIdx = row*2+1;
                    
                    if(leftIdx < numTrays && leftIdx < items.length){
                        let shelf = createShelf(items[leftIdx], 'left');
                        rowDiv.appendChild(shelf);
                        state.trays.push({ 
                            el: shelf, 
                            badge: shelf.querySelector('.tray-badge'), 
                            current: 0, 
                            max: CONFIG.TRAY_MAX, 
                            emoji: items[leftIdx] 
                        });
                    }
                    if(rightIdx < numTrays && rightIdx < items.length){
                        let shelf = createShelf(items[rightIdx], 'right');
                        rowDiv.appendChild(shelf);
                        state.trays.push({ 
                            el: shelf, 
                            badge: shelf.querySelector('.tray-badge'), 
                            current: 0, 
                            max: CONFIG.TRAY_MAX, 
                            emoji: items[rightIdx] 
                        });
                    }
                    if(rowDiv.children.length) fridgeBody.appendChild(rowDiv);
                }
            }
            
            function createShelf(emoji, pos){
                let shelf = document.createElement('div'); 
                shelf.className = `shelf ${pos}`;
                shelf.innerHTML = `<div class="tray-compartment"><div class="tray-cell">${emoji}</div><span class="tray-badge">0/${CONFIG.TRAY_MAX}</span></div>`;
                return shelf;
            }
            
            function fillItemQueue(){
                let available = state.trays.filter(t => t.current < t.max);
                if(available.length === 0){ 
                    state.itemQueue = []; 
                    return; 
                }
                state.itemQueue = [];
                for(let i=0; i<14; i++){ 
                    let rand = available[Math.floor(Math.random() * available.length)]; 
                    state.itemQueue.push(rand.emoji); 
                }
            }
            
            function updateItemBelt(){
                const belt = document.getElementById('gameItems');
                if(!belt) return;
                belt.innerHTML = '';
                if(state.gameWon || !state.gameActive) return;
                
                let available = state.trays.filter(t=>t.current < t.max);
                if(available.length === 0){ 
                    belt.innerHTML = '<div style="opacity:0.5;">✨ All full! ✨</div>'; 
                    return; 
                }
                
                let displayItems = state.itemQueue.slice(0,8);
                displayItems.forEach(emoji => {
                    let item = document.createElement('span'); 
                    item.className = 'item'; 
                    item.textContent = emoji;
                    item.addEventListener('mousedown', (e) => { 
                        e.preventDefault(); 
                        startDrag(item, emoji, e.clientX, e.clientY); 
                    });
                    item.addEventListener('touchstart', (e) => { 
                        e.preventDefault(); 
                        let t = e.touches[0]; 
                        startDrag(item, emoji, t.clientX, t.clientY); 
                    }, {passive: false});
                    belt.appendChild(item);
                });
            }
            
            function startDrag(item, emoji, x, y){
                if(!state.gameActive || state.gameWon) return;
                drag.active = true; 
                drag.item = item; 
                drag.emoji = emoji;
                drag.ghost = document.createElement('div'); 
                drag.ghost.className = 'drag-ghost'; 
                drag.ghost.textContent = emoji;
                document.body.appendChild(drag.ghost);
                drag.ghost.style.left = x + 'px'; 
                drag.ghost.style.top = y + 'px';
                item.style.opacity = '0.3';
                state.trays.forEach(tray => { 
                    if(tray.emoji === emoji && tray.current < tray.max) 
                        tray.el.classList.add('highlight'); 
                });
            }
            
            function moveDrag(x,y){ 
                if(drag.active && drag.ghost){ 
                    drag.ghost.style.left = x + 'px'; 
                    drag.ghost.style.top = y + 'px'; 
                } 
            }
            
            function endDrag(x,y){
                if(!drag.active) return;
                let targetEl = document.elementsFromPoint(x,y).find(el => el.classList && el.classList.contains('shelf'));
                if(targetEl){
                    let tray = state.trays.find(t => t.el === targetEl);
                    if(tray && drag.emoji === tray.emoji && tray.current < tray.max && !state.gameWon){
                        tray.current++; 
                        tray.badge.textContent = `${tray.current}/${tray.max}`;
                        state.currentScore += CONFIG.POINTS_PER_ITEM;
                        document.getElementById('gameScore').textContent = state.currentScore;
                        if(drag.item && drag.item.parentNode) drag.item.remove();
                        let idx = state.itemQueue.indexOf(drag.emoji);
                        if(idx !== -1) state.itemQueue.splice(idx,1);
                        if(tray.current >= tray.max) tray.el.classList.add('hidden-tray');
                        if(state.itemQueue.length < 5) fillItemQueue();
                        updateItemBelt();
                        updateProgressBar();
                        playCorrectSound(); 
                        if(state.trays.every(t => t.current >= t.max)) endGame('win');
                    } else { 
                        state.currentScore = Math.max(0, state.currentScore - CONFIG.PENALTY_PER_MISTAKE); 
                        document.getElementById('gameScore').textContent = state.currentScore;
                        playWrongSound(); 
                    }
                } else { 
                    state.currentScore = Math.max(0, state.currentScore - CONFIG.PENALTY_PER_MISTAKE); 
                    document.getElementById('gameScore').textContent = state.currentScore;
                    playWrongSound(); 
                }
                cleanupDrag();
            }
            
            function cleanupDrag(){
                if(drag.ghost && drag.ghost.parentNode) drag.ghost.remove();
                if(drag.item) drag.item.style.opacity = '1';
                state.trays.forEach(t => t.el.classList.remove('highlight'));
                drag.active = false; 
                drag.item = null; 
                drag.ghost = null;
            }
            
            function updateProgressBar(){
                let total = state.trays.reduce((s,t) => s + t.current, 0);
                let maxTotal = state.trays.length * CONFIG.TRAY_MAX;
                let percent = maxTotal ? (total / maxTotal) * 100 : 0;
                document.getElementById('gameProgress').style.width = `${percent}%`;
            }
            
            function startTimer(){
                if(state.timerInterval) clearInterval(state.timerInterval);
                state.timerInterval = setInterval(() => {
                    if(!state.gameActive || state.gameWon) return;
                    state.timeLeft--;
                    document.getElementById('gameTime').textContent = state.timeLeft;
                    if(state.timeLeft <= 30) document.getElementById('gameTime').style.color = '#ff6b6b';
                    if(state.timeLeft <= 0) endGame('loss');
                }, 1000);
            }
            
            function endGame(result){
                state.gameActive = false;
                if(state.timerInterval) clearInterval(state.timerInterval);
                let timeBonus = Math.floor(state.timeLeft / 10) * 2;
                let totalScore = state.currentScore + timeBonus;
                
                if(result === 'win'){
                    let level = state.currentLevel;
                    let earnedCoins = calculateCoinsEarned(level);
                    state.totalCoins += earnedCoins;
                    if(!state.completedLevels[state.currentCategory].includes(level)){
                        state.completedLevels[state.currentCategory].push(level);
                    }
                    if(level === state.levels[state.currentCategory] && level < CONFIG.MAX_LEVEL){
                        state.levels[state.currentCategory]++;
                    }
                    state.wins[state.currentCategory]++;
                    document.getElementById('resultTitle').textContent = '🏆 VICTORY!';
                    document.getElementById('resultMessage').textContent = `Level ${level} completed!`;
                    document.getElementById('coinsEarned').textContent = `+${earnedCoins}`;
                    let effect = document.createElement('div'); 
                    effect.className = 'victory-effect'; 
                    document.body.appendChild(effect); 
                    setTimeout(() => effect.remove(), 1000);
                    playVictorySound(); // Play victory fanfare!
                } else {
                    state.losses[state.currentCategory]++;
                    document.getElementById('resultTitle').textContent = '⏰ TIME\'S UP';
                    document.getElementById('resultMessage').textContent = 'Try again!';
                    document.getElementById('coinsEarned').textContent = '0';
                    playWrongSound();
                }
                document.getElementById('finalScore').textContent = totalScore;
                document.getElementById('timeBonus').textContent = `+${timeBonus}`;
                updateStatsUI();
                renderVictoryButtons(result === 'win', state.currentLevel);
                document.getElementById('resultModal').classList.add('show');
                cleanupDrag();
            }
            
            function renderVictoryButtons(isWin, level){
                let container = document.getElementById('victoryButtons');
                container.innerHTML = '';
                if(isWin){
                    let playAgain = document.createElement('button'); 
                    playAgain.className = 'btn-small'; 
                    playAgain.textContent = 'PLAY AGAIN';
                    playAgain.onclick = () => { 
                        document.getElementById('resultModal').classList.remove('show'); 
                        startGameWithLevel(state.currentCategory, level); 
                    };
                    container.appendChild(playAgain);
                    
                    if(level < CONFIG.MAX_LEVEL){
                        let next = document.createElement('button'); 
                        next.className = 'btn-small'; 
                        next.style.background = '#5aa9e6'; 
                        next.innerHTML = '➡️ NEXT LEVEL';
                        next.onclick = () => { 
                            document.getElementById('resultModal').classList.remove('show'); 
                            startGameWithLevel(state.currentCategory, level + 1); 
                        };
                        container.appendChild(next);
                    }
                    
                    let levelsBtn = document.createElement('button'); 
                    levelsBtn.className = 'btn-small'; 
                    levelsBtn.textContent = 'LEVELS';
                    levelsBtn.onclick = () => { 
                        document.getElementById('resultModal').classList.remove('show'); 
                        showLevelPage(state.currentCategory); 
                    };
                    container.appendChild(levelsBtn);
                } else {
                    let retry = document.createElement('button'); 
                    retry.className = 'btn-small'; 
                    retry.textContent = 'TRY AGAIN';
                    retry.onclick = () => { 
                        document.getElementById('resultModal').classList.remove('show'); 
                        startGameWithLevel(state.currentCategory, state.currentLevel); 
                    };
                    container.appendChild(retry);
                    
                    let levelsBtn = document.createElement('button'); 
                    levelsBtn.className = 'btn-small'; 
                    levelsBtn.textContent = 'LEVELS';
                    levelsBtn.onclick = () => { 
                        document.getElementById('resultModal').classList.remove('show'); 
                        showLevelPage(state.currentCategory); 
                    };
                    container.appendChild(levelsBtn);
                }
            }
            
            function showPage(pageId){
                const pages = ['welcomePage', 'categoryPage', 'levelPage', 'gamePage'];
                pages.forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.classList.add('hidden');
                });
                document.getElementById(pageId).classList.remove('hidden');
                if(pageId !== 'gamePage') cleanupDrag();
                if(pageId === 'categoryPage') updateStatsUI();
            }
            
            function showLevelPage(category){
                state.currentCategory = category;
                let catData = CATEGORIES[category];
                document.getElementById('selectedCategoryTitle').innerHTML = `${catData.emoji} ${catData.name}`;
                renderLevelGrid(category);
                showPage('levelPage');
            }
            
            function setupSoundToggle() {
                const toggleBtn = document.getElementById('soundToggle');
                if (toggleBtn) {
                    toggleBtn.onclick = () => {
                        soundEnabled = !soundEnabled;
                        toggleBtn.innerHTML = soundEnabled ? '🔊 SOUND ON' : '🔇 SOUND OFF';
                        if (soundEnabled && audioContext && audioContext.state === 'suspended') {
                            audioContext.resume();
                        }
                        playClickSound();
                    };
                }
            }
            
            function attachEvents(){
                document.getElementById('startBtn').onclick = () => { playClickSound(); showPage('categoryPage'); };
                document.getElementById('backFromCat').onclick = () => { playClickSound(); showPage('welcomePage'); };
                document.getElementById('backToCategory').onclick = () => { playClickSound(); showPage('categoryPage'); };
                document.getElementById('backToLevels').onclick = () => { playClickSound(); showLevelPage(state.currentCategory); };
                document.getElementById('selectFruit').onclick = () => { playClickSound(); showLevelPage('fruit'); };
                document.getElementById('selectVeg').onclick = () => { playClickSound(); showLevelPage('veg'); };
                document.getElementById('selectDrink').onclick = () => { playClickSound(); showLevelPage('drink'); };
                
                document.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
                document.addEventListener('mouseup', (e) => endDrag(e.clientX, e.clientY));
                document.addEventListener('touchmove', (e) => { 
                    e.preventDefault(); 
                    let t = e.touches[0]; 
                    moveDrag(t.clientX, t.clientY); 
                }, {passive: false});
                document.addEventListener('touchend', (e) => { 
                    e.preventDefault(); 
                    let t = e.changedTouches[0]; 
                    endDrag(t.clientX, t.clientY); 
                });
                document.addEventListener('touchcancel', () => cleanupDrag());
                
                setupSoundToggle();
            }
            
            updateStatsUI();
            attachEvents();
            showPage('welcomePage');
            
            document.body.addEventListener('click', function initAudioOnFirstClick() {
                initAudio();
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                document.body.removeEventListener('click', initAudioOnFirstClick);
            });
        })();
    </script>
</body>
</html>
